name: Trigger Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: trigger-release
  cancel-in-progress: false

env:
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gramadoc-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable
      - run: corepack prepare pnpm@10.6.5 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm test:release-gate

  release:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      no_release: ${{ steps.release_tag.outputs.no_release }}
      image: ${{ steps.image.outputs.value }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable
      - run: corepack prepare pnpm@10.6.5 --activate
      - run: pnpm install --frozen-lockfile

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm release

      - name: Resolve image name
        id: image
        run: echo "value=${API_IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: release_tag
        run: |
          TAG=$(git tag --points-at HEAD | tail -n 1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$TAG" ]; then
            echo "no_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.release_tag.outputs.no_release != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: node scripts/generate-release-notes.mjs "$TAG"

      - name: Upload release notes artifact
        if: steps.release_tag.outputs.no_release != 'true'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-notes
          path: RELEASE.md
          if-no-files-found: error

  build-api-image:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.no_release != 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable
      - run: corepack prepare pnpm@10.6.5 --activate
      - run: pnpm install --frozen-lockfile

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ needs.release.outputs.image }}
          tags: |
            type=raw,value=${{ needs.release.outputs.tag }}
            type=raw,value=latest

      - name: Build API artifacts
        run: pnpm --filter @markwylde/gramadoc-api build

      - name: Build and push image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: packages/gramadoc-api/Dockerfile
          push: true
          build-args: |
            RELEASE_TAG=${{ needs.release.outputs.tag }}
            RELEASE_URL=https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-site:
    runs-on: ubuntu-latest
    needs: [release, build-api-image]
    if: needs.release.outputs.no_release != 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable
      - run: corepack prepare pnpm@10.6.5 --activate
      - run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          VITE_BASE_PATH: /
          VITE_RELEASE_TAG: ${{ needs.release.outputs.tag }}
          VITE_RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}
        run: |
          pnpm --filter @markwylde/gramadoc build
          pnpm --filter @markwylde/gramadoc-react build
          pnpm --filter @markwylde/gramadoc.com build

      - uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: apps/gramadoc.com/dist

      - id: deployment
        uses: actions/deploy-pages@v4.0.5

  publish-release-notes:
    runs-on: ubuntu-latest
    needs: [release, build-api-image]
    if: needs.release.outputs.no_release != 'true'

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-notes

      - name: Append release rollout details
        env:
          TAG: ${{ needs.release.outputs.tag }}
          IMAGE: ${{ needs.release.outputs.image }}
        run: |
          cat <<EOF >> RELEASE.md

          ## 🚀 Release Assets

          - Published the API image as \`${IMAGE}:${TAG}\` and \`${IMAGE}:latest\`.
          EOF

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release edit "$TAG" --repo "$GH_REPO" --notes-file RELEASE.md
